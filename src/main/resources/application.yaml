spring:
 datasource:
  # Use 'db' because that is the service name in your docker-compose.yml
  url: jdbc:postgresql://db:5432/myappdb
  username: dbuser
  password: dbpass
  driver-class-name: org.postgresql.Driver

 jpa:
  hibernate:
   # Automatically creates the tables based on your @Entity classes
   ddl-auto: update
  show-sql: true
  properties:
   hibernate:
    dialect: org.hibernate.dialect.PostgreSQLDialect

logging:
 file:
  # Maps to the volume we defined in Docker Compose
  name: /app/logs/spring.log