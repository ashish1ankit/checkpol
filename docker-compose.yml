version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: postgres-db
    environment:
      POSTGRES_DB: myappdb
      POSTGRES_USER: dbuser
      POSTGRES_PASSWORD: dbpass
    ports:
      - "5432:5432"  # This line "opens the door" to your master laptop
    volumes:
      - /var/lib/my-spring-app/pgdata:/var/lib/postgresql/data
    restart: unless-stopped

  app:
    image: my-app:latest
    container_name: my-app-container
    depends_on:
      - db
    ports:
      - "8081:8080"
    volumes:
      - /var/log/my-spring-app:/app/logs
    restart: unless-stopped